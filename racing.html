<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ultimate Racing Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
touch-action:none;
}

body{
overflow:hidden;
background:#111;
}

canvas{
display:block;
background:linear-gradient(#5cc7ff,#87ceeb);
}

#menu{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#111,#222);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
}

#menu h1{
font-size:50px;
margin-bottom:20px;
}

#cars{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
justify-content:center;
}

.carCard{
background:#333;
padding:20px;
border-radius:20px;
width:150px;
text-align:center;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.carPreview{
width:100px;
height:50px;
margin:auto;
border-radius:12px;
margin-bottom:10px;
}

button{
padding:15px 30px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
background:gold;
}

#ui{
position:fixed;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
color:white;
font-size:20px;
font-weight:bold;
z-index:50;
text-shadow:2px 2px 4px black;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:50;
}

.leftControls,
.rightControls{
display:flex;
gap:15px;
}

.btn{
width:80px;
height:80px;
border:none;
border-radius:50%;
background:rgba(255,255,255,0.3);
color:white;
font-size:30px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

.btn:active{
transform:scale(0.9);
}

#message{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.8);
color:white;
padding:25px 40px;
font-size:30px;
border-radius:20px;
display:none;
z-index:200;
}

</style>
</head>

<body>

<div id="menu">

<h1>🏁 Ultimate Racing</h1>

<div id="cars">

<div class="carCard" onclick="selectCar('red',8)">
<div class="carPreview" style="background:red"></div>
<h3>Speedster</h3>
<p>Fast</p>
</div>

<div class="carCard" onclick="selectCar('blue',6)">
<div class="carPreview" style="background:blue"></div>
<h3>Storm</h3>
<p>Balanced</p>
</div>

<div class="carCard" onclick="selectCar('lime',5)">
<div class="carPreview" style="background:lime"></div>
<h3>Tank</h3>
<p>Strong</p>
</div>

</div>

<button onclick="startGame()">START RACE</button>

</div>

<div id="ui">

<div>
Level: <span id="level">1</span>
</div>

<div>
Coins: <span id="coins">0</span>
</div>

<div>
Position: <span id="position">1st</span>
</div>

</div>

<div id="message"></div>

<div id="controls">

<div class="leftControls">
<button class="btn" id="leftBtn">◀</button>
<button class="btn" id="rightBtn">▶</button>
</div>

<div class="rightControls">
<button class="btn" id="brakeBtn">⬇</button>
<button class="btn" id="boostBtn">⚡</button>
</div>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener('resize',resize);

let gameStarted = false;
let selectedColor = 'red';
let selectedSpeed = 8;
let level = 1;
let coins = 0;
let roadOffset = 0;

const keys = {
left:false,
right:false,
boost:false,
brake:false
};

const player = {
x:0,
y:0,
w:60,
h:120,
speed:0,
maxSpeed:8
};

function resetPlayer(){
player.x = canvas.width/2 - 30;
player.y = canvas.height - 180;
}

resetPlayer();

const opponents = [];
const roadLines = [];
const coinItems = [];

for(let i=0;i<20;i++){

roadLines.push({
y:i*80
});

}

function createLevel(){

opponents.length = 0;
coinItems.length = 0;

for(let i=0;i<level+2;i++){

opponents.push({

x:Math.random()*(canvas.width-200)+100,
y:-i*300,
w:60,
h:120,
speed:4+Math.random()*3,

color:[
'yellow',
'orange',
'purple',
'cyan'
][Math.floor(Math.random()*4)]

});

}

for(let i=0;i<15;i++){

coinItems.push({

x:Math.random()*(canvas.width-200)+100,
y:-i*400,
collected:false

});

}

}

createLevel();

function selectCar(color,speed){

selectedColor = color;
selectedSpeed = speed;
player.maxSpeed = speed;

}

function startGame(){

document.getElementById('menu').style.display='none';

gameStarted = true;

}

function showMessage(text){

const m = document.getElementById('message');

m.innerText = text;

m.style.display='block';

setTimeout(()=>{
m.style.display='none';
},2000);

}

function drawEnvironment(){

ctx.fillStyle='green';

ctx.fillRect(0,0,canvas.width*0.2,canvas.height);

ctx.fillRect(canvas.width*0.8,0,canvas.width*0.2,canvas.height);

ctx.fillStyle='#2e8b57';

for(let i=0;i<10;i++){

ctx.beginPath();

ctx.arc(
80,
i*200+roadOffset%200,
40,
0,
Math.PI*2
);

ctx.fill();

ctx.beginPath();

ctx.arc(
canvas.width-80,
i*200+roadOffset%200,
40,
0,
Math.PI*2
);

ctx.fill();

}

roadOffset += player.speed;

}

function drawRoad(){

ctx.fillStyle='#444';

ctx.fillRect(
canvas.width*0.2,
0,
canvas.width*0.6,
canvas.height
);

ctx.fillStyle='white';

for(let line of roadLines){

ctx.fillRect(
canvas.width/2-10,
line.y,
20,
50
);

line.y += player.speed + 6;

if(line.y > canvas.height){

line.y = -60;

}

}

}

function drawPlayer(){

ctx.fillStyle = selectedColor;

ctx.fillRect(
player.x,
player.y,
player.w,
player.h
);

ctx.fillStyle='black';

ctx.fillRect(
player.x+8,
player.y+10,
44,
25
);

ctx.fillStyle='white';

ctx.fillRect(
player.x+5,
player.y+90,
12,
20
);

ctx.fillRect(
player.x+43,
player.y+90,
12,
20
);

}

function drawOpponents(){

for(let car of opponents){

ctx.fillStyle = car.color;

ctx.fillRect(
car.x,
car.y,
car.w,
car.h
);

ctx.fillStyle='black';

ctx.fillRect(
car.x+8,
car.y+10,
44,
25
);

car.y += player.speed - car.speed;

if(car.y > canvas.height+200){

car.y = -400;

car.x = Math.random()*(canvas.width-200)+100;

}

if(collide(player,car)){

crash();

}

}

}

function drawCoins(){

for(let c of coinItems){

if(c.collected) continue;

ctx.fillStyle='gold';

ctx.beginPath();

ctx.arc(
c.x,
c.y,
12,
0,
Math.PI*2
);

ctx.fill();

c.y += player.speed + 5;

if(c.y > canvas.height){

c.y = -500;

c.x = Math.random()*(canvas.width-200)+100;

}

const dx = player.x+30 - c.x;
const dy = player.y+60 - c.y;

if(Math.sqrt(dx*dx+dy*dy)<40){

c.collected = true;

coins += 10;

document.getElementById('coins').innerText = coins;

setTimeout(()=>{

c.collected = false;
c.y = -500;

},1000);

}

}

}

function updatePlayer(){

if(keys.left) player.x -= 7;

if(keys.right) player.x += 7;

if(keys.boost){

player.speed = player.maxSpeed + 5;

}
else if(keys.brake){

player.speed = 2;

}
else{

player.speed = player.maxSpeed;

}

if(player.x < canvas.width*0.2){

player.x = canvas.width*0.2;

}

if(player.x + player.w > canvas.width*0.8){

player.x = canvas.width*0.8 - player.w;

}

}

function collide(a,b){

return(

a.x < b.x+b.w &&
a.x+a.w > b.x &&
a.y < b.y+b.h &&
a.y+a.h > b.y

);

}

function crash(){

showMessage('💥 Crash!');

resetPlayer();

coins = Math.max(0,coins-20);

document.getElementById('coins').innerText = coins;

}

function nextLevel(){

level++;

if(level > 20){

showMessage('🏆 YOU WON ALL 20 LEVELS!');

level = 20;

return;

}

showMessage('🏁 Level '+level);

document.getElementById('level').innerText = level;

createLevel();

}

setInterval(()=>{

if(gameStarted){

nextLevel();

}

},30000);

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(gameStarted){

updatePlayer();

drawEnvironment();

drawRoad();

drawCoins();

drawOpponents();

drawPlayer();

}

requestAnimationFrame(gameLoop);

}

gameLoop();

function bind(id,key){

const btn = document.getElementById(id);

btn.addEventListener('touchstart',e=>{

e.preventDefault();

keys[key]=true;

});

btn.addEventListener('touchend',e=>{

e.preventDefault();

keys[key]=false;

});

}

bind('leftBtn','left');
bind('rightBtn','right');
bind('boostBtn','boost');
bind('brakeBtn','brake');

addEventListener('keydown',e=>{

if(e.code==='ArrowLeft') keys.left=true;

if(e.code==='ArrowRight') keys.right=true;

if(e.code==='ShiftLeft') keys.boost=true;

if(e.code==='ArrowDown') keys.brake=true;

});

addEventListener('keyup',e=>{

if(e.code==='ArrowLeft') keys.left=false;

if(e.code==='ArrowRight') keys.right=false;

if(e.code==='ShiftLeft') keys.boost=false;

if(e.code==='ArrowDown') keys.brake=false;

});

</script>

</body>
</html>
